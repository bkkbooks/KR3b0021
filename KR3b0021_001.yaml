body:
  text: 苻子方外太公涓釣於隱溪五十有六年矣而未嘗得一魚魯連聞之往而觀其釣太公涓跪石隱崖且不餌而釣仰詠俯吟及暮而釋竿其膝所處之石皆若臼其跗觸崖若路魯連曰釣所以在魚無魚何釣太公曰不見康王父之釣耶念蓬萊釣巨海摧岸投綸五百年矣方吾猶一朝耳太平御覽卷九百三十五又卷八百三十四引符子方外至釋竿路史後紀卷四羅蘋注志存四海之外虞世南北堂書鈔卷十二朗家楚朗棄千金之劍把符子而趍抱朴子趨謂曰何夫子棄大而存小乎苻朗不應夫千金利劍剖割之所存焉苻子之書大道之所居焉有澤父者冠葭蘆之笠納鹿之履莎裳褐衣緩步而去許由謂堯曰坐于華殿之上面雙闕之下君之榮願亦己足矣夫堯曰余坐于華殿之上森然而松生於棟余立于櫺扉之內霏然而雲生于牖雖面雙闕無異乎崔嵬之冠蓬萊雖背墉郭無異乎回巒之縈崑崙余安知其所以榮歐陽詢藝文類聚卷十一太平御覽卷八十禹讓天下於奇子奇子曰君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣藝文類聚卷十一太平御覽卷八十二又卷四百二十四堯舜之智桀紂以為不智堯舜以為智惡知堯舜之非桀紂桀紂之非堯舜乎藝文類聚卷二十一太伯將讓其國於季歷謂其傅曰太王欲以一國之事而以嗣我我其羞之吾聞至人也不君一世而萬世以之君不貴一代而萬代以之貴吾安能貴乎一國而賤乎萬代哉藝文類聚卷二十一太平御覽卷四百二十四堯以天下讓巢父巢父曰君之牧天下亦猶余之牧孤犢君牧天下是各有其所牧矣君焉用惴惴焉以所牧而與余余無用天下為也於是牽犢而去藝文類聚卷九十四朔人獻燕昭王以大豕者曰養奚若使曰豕也非大圊不居非人便不珍於今年百二十矣邦人謂之豕仙王乃命豕宰養六十五年大如沙墳足如不勝其體王異之令衡官嬌而量之折十嬌豕不量又命水官舟而量其重千鈞其巨無用燕相謂王曰奚不饗之王命宰夫膳之豕既死夕乃見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣今仗君之靈而化吾生也始得為魯津之伯而浮舟者食我以粳糧之珍而欣君之惠將報子死焉後燕相遊於魯津有赤龜銜夜光而獻之藝文類聚卷九十六太平御覽卷九百三十一觀於龍門有一魚奮鱗鼓鬐而登乎龍門而為龍又一術士凌波蹈流而不陷搖鈴行歌飄浪於龍門而終日棲遲而不化彼同功而事異迹一而理二夫何哉無乃魚以實應而人以偽求乎藝文類聚卷九十六東海有鼇焉冠蓬萊而浮遊於滄海騰躍而上則于之雲峰類邁於群嶽沈沒而下則隱天之邱潛嶠於重川有紅蟻者聞而悅之與群蟻相要乎海畔欲觀之行月餘日鼇潛末出群蟻中將反遇長風激浪崇濤萬仞海水沸地雷震群蟻曰此將鼇之作也數日風止雷默海中隱淪如屺其高概天或遊而西群蟻曰彼之冠山何異乎我之戴粒也逍遙壤封之巔歸服乎窟穴之下此乃物我之適自己而然我何用數百里勞形而觀之乎藝文類聚卷九十七太平御覽卷九百四十七晉公子重耳奔齊與五臣遊乎大澤之中見蜘蛛布其網曳其繩執豸以食之公子重耳乃撫僕之手駐駟而觀之顧其臣咎犯曰此蟲也智之德薄矣而猶役其智布其網曳其繩執豸而食之況乎人之智而不能廓垂天之網布絡地之繩以供方丈之御是曾不如蜘蛛之智孰不可謂之人乎咎犯曰公子慎勿言也君終行之則有邦有嗣也藝文類聚卷九十七太平御覽卷九百四十八楚之交子魯之周子齊之狂子三子相與居乎泰山之陽處乎環堵之室蓽戶不扉蓋茨不翳而高歌不輟初學記卷十八太平御覽卷四百八十五至人之道也如鏡有明有照有引有致初學記卷二十五白居易六帖卷十三有驢仙者享五百歲負乘而不輟歷無定主大驛於天下初學記卷二十九太平御覽卷九百一盛魄重輪六合俱照非日月能乎太平御覽卷三又卷四水生於石未有居山而溺者火生於木未有抱樹而焦者黃帝將適昆虞之邱中路逢容成子乘翠華之蓋建日月之旗驂參虬御雙鳥黃帝命方明避路謂容成子曰吾將釣于一壑栖于一邱黃帝謂其友無為子曰我勞天下矣疲於形役請息駕於玄圃子直代之無為子曰焉能棄我之逸而為君之勞哉乃攀龍而俱去舜禪禹於洞庭之野太平御覽卷八十一桀觀炮烙於瑤臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛之心焉逢曰天下苦之而君樂臣為股肱孰有心悅而股肱不悅乎桀曰聽子諫諫得我功之不得我刑之龍逢曰臣觀君冕非冕也冕危石也臣觀君履非履也履春冰也未有冠危石而不壓履春冰而不陷者桀歎曰子知我之亡而不自知亡子就炮烙之刑吾觀子亡子知我不亡龍逢行歌曰造化勞我以生休我以炮烙故涉新我樂而人不知布武而趜乃赴火而死魯侯欲以孔子為司徒將召三桓而議之乃謂左邱明曰寡人欲以孔某為司徒而授以魯政焉寡人將欲詢諸三子左邱明曰孔某聖人與夫聖人在政過者離位焉君雖欲謀其遂弗合乎魯侯曰吾子奚以知之邱明曰周人有愛裘而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率逃於重邱之下羊相呼藏於深林之中故周人十年不制一裘五年不具一牢何者周人之謀失之矣今君欲以孔某為司徒召三桓而議之亦與狐謀裘與羊謀羞哉於是魯侯不以桓謀而召孔子為司徒秦穆公伐晉及河將勞師而醪唯飲一鍾蹇叔曰一米可投河而釀也穆公乃以一醪投河三軍醉矣太平御覽卷二百八十一為道者日損而月章為名者日章而月損太平御覽卷四百三元冥子謂由有子曰子有師乎由有子曰吾將以萬物為師矣太平御覽卷四百四春秋華林傳曰不知不言其所以仁太平御覽卷四百十九武王以天下讓岐封子岐封子曰孰匆匆然以天下為事乎君往矣余不忍聞之太平御覽卷四百二十四惠子家窮餓數日不舉火乃見梁王王曰夏麥方熟請以割子可乎惠子曰施方來遇群川之水長有一人溺流而下呼施救之施應曰吾不善遊方將為子告急於東越之王簡其善遊者以救子可乎溺人曰我得一瓢之力則活矣子方告急於東越之王簡其善遊者以救我是不如求我於重淵之下魚龍之腹矣太平御覽卷四百八十六鄭人有逃暑於孤林之下者日影流移而徙衽以從陰及至暮反席於樹下及月流影移復徙衽以從陰而患露之濡於身其陰逾去而其身逾溼是巧於用晝而拙於月夕奚不處矅而辭陰反林自露此亦愚之至也太平御覽卷四百九十九陶之富者朱公喪其中子鄰人往弔之朱公方擁膝蹲踞捧頭而笑鄰人曰聞有喪將唁子之哀朱公曰生不致哀死而唁何鄰人之不通也太平御覽卷五六十一楚成王生太子商臣乃召楚之善相者相之楚巫相之曰已而言於楚王曰子吉矣而王不吉臣聞鴟梟者食母而飛非其子之不吉但其母為之災今太子非子之不吉但其王為之災耳楚王怒而殺之太平御覽卷七百三十一心能善知人者如明鏡善自知如淵蚌鏡以矅明故鑒人蚌以舍珠故內照太平御覽卷七百十七荊山不貴玉鮫人不貴珠太平御覽卷八百五漢王聞宋朦子方牧羊于巨澤鼓而歌南風之詩使者進謂宋朦子曰漢王聞先生之賢使使者致命于先生而委國政焉宋朦子矍然而顧謂使者曰是何言歟今漢王待四海之士與十群之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫朦不願為也乃逃于陰山之陽太平御覽卷八百三十三天羅廓矣野人猶有罩翳之勤太平御覽卷八百三十四顏子有疾三日不食問之曰吾師也食非丹不餐茹非芝不食故七百歲子何不吮瑤以延生咀蘂以養齡也太平御覽卷八百四十九下安其寐而樂其明是猶夕蛾去暗赴燈而死者也太平御覽卷八百七十又卷九百五十一陸佃埤雅卷十齊景公好馬命畫工圖而訪之殫百乘之價期年而不得像過實也今使愛賢之君考古籍以求其人雖期百年不可得也太平御覽卷八百九十七藝文類聚卷九十三引多脫略吾與元子觀東海釋駟而升乎𡺁山未中路而忘馬苻子使人求之不獲使鬼索之而獲苻子曰六合不可忘知故良馬在其中矣請以六合觀之也太平御覽卷八百九十七魏文侯見宋陵子三仕不顧文侯曰何貧乎曰王見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊富者拜之曰吾羊九十九今君之一盈我成百則牧數足矣鄰書與之從此觀之富者非富貧者非貧也太平御覽卷九百二齊景公謂晏子曰寡人既得寶千乘聚萬駟矣方欲珍懸黎會金玉其得之耶奚若晏嬰曰臣聞琬玉之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肺不食非鳳血不飲其食也常飢而不飽其飲也常渴而弗充生未幾何夭其天年而死金玉之非珍乃為君之患矣太平御覽卷九百二十七務光自投廬廬江之伯以赤鯉送之太平御覽卷九百三十六齊魯爭汶陽之田魯侯有憂色魯有隱者周豐往觀曰臣嘗晝寢愀然聞群蝨之鬭乎衣中甘臣膏腴之肌珍臣項膂之膚相與樹黨爭之日夜不息相殺者大半蝨父止之曰我與爾所慮不過容口奚用竊爭交戰為哉群蝨止今君以七百里地為君之城亦以足矣而以汶陽數步之田惑君之心會不如一蝨之知竊謂君羞之魯侯曰善太平御覽卷九百五十一木生蠋蠋盛而木枯石生金金曜而石流太平御覽卷九百五十二苻子與元子登乎太山下臨千仞本淵上蔭百丈之松蕭蕭然神王乎一邱矣言不出乎耒耜心不過乎俗人其猶木大守脂瓦雞司晨矣太平御覽卷九百五十三趙之相者曰林氏有九子皆賢國人美而稱之號曰九德之父十德之門趙王疾之王乃使人擇其果之煩者伐之其父曰果之茂者猶伐之況其人乎吾將以爾為纍矣去之則免乃攜老持子逃趙相於白雲之巖終身不返趙人思之太平御覽卷九百六十四鄰人謂展禽曰魯聘夫子夫子三黜無憂色何也禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯太平御覽卷九百九十四
